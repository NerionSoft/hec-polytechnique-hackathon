sonar.projectKey=NerionSoft_hec-polytechnique-hackathon
sonar.organization=nerionsoft

sonar.projectName=hec-polytechnique-hackathon
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.integration.test.ts
sonar.exclusions=**/node_modules/**,**/.next/**,**/build/**,**/out/**,**/coverage/**,**/*.config.*,**/public/**

# Coverage: only the back-end layers count. Presentation/app are UI-only and
# excluded from coverage math (they are still scanned for code smells).
sonar.coverage.exclusions=src/app/**,src/presentation/**,**/*.config.*,**/*.d.ts,**/index.ts,**/*.test.ts,**/*.integration.test.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
