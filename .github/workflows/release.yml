name: Release

on:
  push:
    branches:
      - main

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.2.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  tag-major-minor:
    name: Update major/minor version tags
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create/update v$MAJOR and v$MAJOR.$MINOR tags
        env:
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -d "v${MAJOR}" 2>/dev/null || true
          git tag -d "v${MAJOR}.${MINOR}" 2>/dev/null || true
          git push origin ":refs/tags/v${MAJOR}" 2>/dev/null || true
          git push origin ":refs/tags/v${MAJOR}.${MINOR}" 2>/dev/null || true

          git tag -a "v${MAJOR}" -m "Release v${MAJOR}"
          git tag -a "v${MAJOR}.${MINOR}" -m "Release v${MAJOR}.${MINOR}"
          git push origin "v${MAJOR}"
          git push origin "v${MAJOR}.${MINOR}"
